# HHKB Low-Profile – Shield Configuration

CONFIG_ZMK_KEYBOARD_NAME="kb thats it"

# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

# USB
CONFIG_ZMK_USB=y

# NFC pins used as GPIO (C11 = P0.10, C12 = P0.09)
CONFIG_NFCT_PINS_AS_GPIOS=y

# Debounce (default 5ms, increased for switch chatter)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Power management (deep sleep disabled — conflicts with ZMK Studio)
CONFIG_ZMK_IDLE_TIMEOUT=30000
